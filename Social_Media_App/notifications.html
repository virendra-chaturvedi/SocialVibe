<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialVibe - Notifications</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
 
    <div class="app-container">
        
        <!-- Main Application Sidebar Menu -->
        <aside class="sidebar">
            <h2 class="logo"><i class="fa-solid fa-share-nodes"></i> SocialVibe</h2>
            <nav class="nav-menu">
                <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="messages.html"><i class="fa-solid fa-message"></i> Messages</a>
                <a href="notifications.html" class="active"><i class="fa-solid fa-bell"></i> Notifications</a>
                <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
            </nav>
        </aside>
 
        <!-- Primary Notification Workspace Pane -->
        <main class="notification-section">
            <div class="page-header">
                <h3>Notifications</h3>
            </div>
 
            <div class="notification-list">
                <div class="notification-card unread">
                    <div class="avatar default-av-3 view-peer-profile" data-peer="jane" style="cursor:pointer;"></div>
                    <div class="notif-content">
                        <p><strong class="view-peer-profile" data-peer="jane" style="cursor:pointer;">Jane Doe</strong> liked your recent post about web development.</p>
                        <small>5 minutes ago</small>
                    </div>
                    <span class="unread-dot"></span>
                </div>
 
                <div class="notification-card unread">
                    <div class="avatar default-av-2 view-peer-profile" data-peer="sam" style="cursor:pointer;"></div>
                    <div class="notif-content">
                        <p><strong class="view-peer-profile" data-peer="sam" style="cursor:pointer;">Sam Wilson</strong> started following you.</p>
                        <small>1 hour ago</small>
                    </div>
                    <button class="follow-back-btn" id="followToggleBtn">Follow Back</button>
                </div>
 
                <div class="notification-card">
                    <div class="avatar default-av-1 view-peer-profile" data-peer="alex" style="cursor:pointer;"></div>
                    <div class="notif-content">
                        <p><strong class="view-peer-profile" data-peer="alex" style="cursor:pointer;">Alex Jones</strong> commented on your post: "Amazing work buddy!"</p>
                        <small>Yesterday</small>
                    </div>
                </div>
            </div>
        </main>
 
    </div>
 
    <script src="script.js"></script>
</body>
</html>
